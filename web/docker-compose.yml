version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: x2dhf_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  backend:
    build:
      context: ..
      dockerfile: web/Dockerfile.backend
    environment:
      DEBUG: "False"
      SECRET_KEY: "your-secret-key-here"
      DB_NAME: x2dhf_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://frontend:3000
      X2DHF_DIRECTORY: /opt/x2dhf
      X2DHF_BINARY_PATH: /opt/x2dhf/bin/xhf
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    command: bash -c "python manage.py migrate && gunicorn x2dhf_project.wsgi:application --bind 0.0.0.0:8000"
  celery_worker:
    build:
      context: ..
      dockerfile: web/Dockerfile.backend
    environment:
      DEBUG: "False"
      SECRET_KEY: "your-secret-key-here"
      DB_NAME: x2dhf_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      X2DHF_DIRECTORY: /opt/x2dhf
      X2DHF_BINARY_PATH: /opt/x2dhf/bin/xhf
    depends_on:
      - db
      - redis
    command: celery -A x2dhf_project worker -l info
volumes:
  postgres_data:
