version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: x2dhf_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ..
      dockerfile: web/Dockerfile.backend
    environment:
      DEBUG: "False"
      SECRET_KEY: "your-secret-key-here-change-in-prod"
      DB_NAME: x2dhf_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,backend,api.x2dhf.local
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
      STRIPE_SECRET_KEY: sk_test_xxxxx
      X2DHF_DIRECTORY: /opt/x2dhf
      X2DHF_BINARY_PATH: /opt/x2dhf/bin/xhf
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn x2dhf_project.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class sync"
    volumes:
      - static_volume:/opt/x2dhf/web/backend/staticfiles
      - media_volume:/opt/x2dhf/web/backend/media
  celery_worker:
    build:
      context: ..
      dockerfile: web/Dockerfile.backend
    environment:
      DEBUG: "False"
      SECRET_KEY: "your-secret-key-here-change-in-prod"
      DB_NAME: x2dhf_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      X2DHF_DIRECTORY: /opt/x2dhf
      X2DHF_BINARY_PATH: /opt/x2dhf/bin/xhf
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A x2dhf_project worker -l info -c 4
    volumes:
      - media_volume:/opt/x2dhf/web/backend/media
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      REACT_APP_API_URL: http://backend:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend
      - frontend
volumes:
  postgres_data:
  static_volume:
  media_volume:
